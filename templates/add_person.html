<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Member</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <main class="container">
        <h1 class="page-title">Nouveau membre de la famille</h1>

        <form method="post" action="/people/{{ parent._id }}/add_person" class="card form-card">
            <label>Nom</label>
            <input 
                type="text"
                name="name"
                placeholder="Nom du membre de la famille"
                value="{{ query or '' }}" required>

            <label>Location</label>
            <input 
                type="text"
                name="location"
                placeholder="Location du membre de la famille"
                value="{{ query or '' }}">

            <label>Epoux/se</label>
            <input 
                type="text"
                name="partner"
                placeholder="Epoux/se"
                value="{{ query or '' }}">

            <button type="submit">Enregistrer</button>
            <a class="button secondary" href="/">Retour</a>
        </form>
    </main>
</body>
</html>
